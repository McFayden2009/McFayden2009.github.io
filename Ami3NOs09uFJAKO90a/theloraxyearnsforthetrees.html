<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>look within</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFF;
      background-image: url("theloraxyearns.png");
      background-size: 100% 100%;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      position: absolute;
      left: 40%;
      top: 20%;
      width: 22%;
      height: 12%;
      display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 1% 1% 1% 1%;
  box-sizing: border-box;
  background-color: #343;
}

.box input {
  width: 92%;
  height: auto;
  background: transparent;
  border: none;
  outline: none;
  color: #00ff66;
  font-size: clamp(16px, 2vw, 28px);
  text-align: left;
  caret-color: #00ff66;
  font-family: monospace;
  text-shadow: 0 0 6px rgba(0, 255, 102, 0.4);
  align-self: flex-start;
}

    .box input::placeholder {
      color: rgba(0, 255, 102, 0.5);
    }

    #resultBox {
      display: none;
      margin-top: 10%;
      width: 95%;
      height: 80%;
      position: absolute;
      resize: none;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 102, 0.4);
      color: #00ff66;
      font-family: monospace;
      font-size: clamp(14px, 1.5vw, 20px);
      text-align: left;
      padding: 10px;
      box-sizing: border-box;
      align-self: flex-start;
    }

    #wrongCode {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      color: #ff6666;
      font-family: monospace;
      font-size: clamp(14px, 1.5vw, 20px);
      white-space: nowrap;
    }

    .hidden-submit {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

#flashOverlay {
  position: fixed;
  inset: 0;
  background: #FFF;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
}

#flashOverlay img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

  </style>
</head>
<body>
  <div class="stage" id="stage">
      <div class="box">
        <form id="codeForm" autocomplete="off">
          <input
            id="codeInput"
            type="text"
            placeholder="answer here"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button class="hidden-submit" type="submit">Submit</button>
        </form>

        <textarea id="resultBox" readonly></textarea>
        <div id="wrongCode"></div>
      </div>
  </div>

  <div id="flashOverlay" style="display:none;">
    <img id="flashImage" alt="flash" />
  </div>

  const imageSaltB64 = "8xoWvJtqMmCseKMUtwGsSQ==";
  const imageIvB64 = "3kTeFojj5ONZ6zzI";

  function base64ToBytes(base64) {
    return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();

    const keyMaterial = await crypto.subtle.importKey(
      "raw",
      enc.encode(password),
      { name: "PBKDF2" },
      false,
      ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        salt,
        iterations: 100000,
        hash: "SHA-256"
      },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function decryptWithPassword(cipherB64, saltB64, ivB64, password) {
    const salt = base64ToBytes(saltB64);
    const iv = base64ToBytes(ivB64);
    const ciphertext = base64ToBytes(cipherB64);

    const key = await deriveKey(password, salt);

    const decryptedBuffer = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv },
      key,
      ciphertext
    );

    return new TextDecoder().decode(decryptedBuffer);
  }

  async function run() {
    const password = document.getElementById("codeInput").value;
    const resultBox = document.getElementById("resultBox");
    const wrongCode = document.getElementById("wrongCode");

    try {
      const decrypted = await decryptWithPassword(
        encryptedData,
        saltB64,
        ivB64,
        password
      );

      if (!decrypted.endsWith(verificationSequence)) {
        throw new Error("Bad verification");
      }

      const secretMessage = decrypted.slice(0, -verificationSequence.length);

      const decryptedImageBase64 = await decryptWithPassword(
        encryptedImageData,
        imageSaltB64,
        imageIvB64,
        password
      );

      const flashOverlay = document.getElementById("flashOverlay");
      const flashImage = document.getElementById("flashImage");

      document.getElementById("stage").style.visibility = "hidden";
      flashOverlay.style.display = "flex";
      flashImage.src = decryptedImageBase64.slice(0, -verificationSequence.length);

      setTimeout(() => {
	window.location.href = secretMessage;
      }, 1000);

    } catch (e) {
      resultBox.style.display = "none";
      wrongCode.textContent = "Wrong code!";
    }
  }

  document.getElementById("codeForm").addEventListener("submit", (e) => {
      e.preventDefault();
      run();
    });

    let audioCtx = null;

    function playClick() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(900, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.08, now + 0.001);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.035);
    }

    document.addEventListener("keydown", (e) => {
      if (
        e.key === "Shift" ||
        e.key === "Control" ||
        e.key === "Alt" ||
        e.key === "Meta"
      ) return;

      playClick();
    });
  </script>
