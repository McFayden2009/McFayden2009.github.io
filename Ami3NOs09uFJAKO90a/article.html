<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article</title>

  <style>
    body {
      visibility: hidden;
    }

  </style>
</head>
<body>
  <form id="articleForm" autocomplete="off">
    <input id="code1" type="text" placeholder='CODE #1' autocomplete="off" spellcheck="false" />
    <input id="code2" type="text" placeholder='CODE #2' autocomplete="off" spellcheck="false" />
    <input id="code3" type="text" placeholder='CODE #3' autocomplete="off" spellcheck="false" />
    <button type="submit">Submit</button>
  </form>

  <script>
    const code0 = sessionStorage.getItem("code0");
    if (!code0) {
      window.location.href = "index.html";
    }
    sessionStorage.removeItem("code0");

    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.visibility = "visible";
    });

    const encryptedData = "4SvCJzfgNN6GC8CMcIRpQXZTOPdavYVyEAvVgHuH+O5qmHnSSCrMEi7GRmQ=";
    const saltB64 = "KXpeYphh2lKDNJxu/L6JFw==";
    const ivB64 = "HSVs8+pMqnCB4Hm7";

    function base64ToBytes(base64) {
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    }

    async function deriveKey(password, salt) {
      const enc = new TextEncoder();

      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations: 100000,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function decryptPayload(combinedPassword) {
      const salt = base64ToBytes(saltB64);
      const iv = base64ToBytes(ivB64);
      const ciphertext = base64ToBytes(encryptedData);

      const key = await deriveKey(combinedPassword, salt);

      const decryptedBuffer = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        ciphertext
      );

      return new TextDecoder().decode(decryptedBuffer).slice(0, -10);
    }

    document.getElementById("articleForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const code1 = document.getElementById("code1").value;
      const code2 = document.getElementById("code2").value;
      const code3 = document.getElementById("code3").value;

      const combined = code0 + code1 + code2 + code3;

      try {
        const decryptedCode = await decryptPayload(combined);
        console.log(decryptedCode);
      } catch (err) {
        console.log("wrong code");
      }
    });
  </script>
</body>
</html>
